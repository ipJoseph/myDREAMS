# myDREAMS Postgres connection hygiene
# Install as: /etc/postgresql/<ver>/main/conf.d/99-mydreams.conf
# Reload: systemctl reload postgresql
#
# Background: 2026-04-21 we found 89 zombie "active" backends aged 4 to 16
# hours blocking new connections. Root cause analysis in
# docs/runbooks/postgres-connection-hygiene.md and
# docs/incidents/20260324-navica-feed-stopped.md.
#
# These three settings together would have prevented that incident:
#   - idle_in_transaction_session_timeout: auto-rollback leaked transactions
#   - statement_timeout: cap any single query's runtime
#   - tcp_keepalives_*: detect dead clients and reap their backends

idle_in_transaction_session_timeout = 300000    # 5 minutes
statement_timeout = 120000                      # 2 minutes
tcp_keepalives_idle = 60                        # seconds before first keepalive probe
tcp_keepalives_interval = 10                    # seconds between probes
tcp_keepalives_count = 6                        # probes before giving up

# Why these values:
# - 5 min idle_in_transaction matches long-polling patterns but kills true leaks
# - 2 min statement_timeout covers pg_dump/backfill single queries but kills runaways
# - TCP keepalives reap dead TCP sockets in ~60 + 10*6 = 120 seconds instead of
#   relying on OS default (which can be 2+ hours)
