name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dreams_ci
          POSTGRES_PASSWORD: dreams_ci
          POSTGRES_DB: dreams_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dreams_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://dreams_ci:dreams_ci@localhost:5432/dreams_ci
      DREAMS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Run pytest
        run: python -m pytest tests/ -v

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (non-blocking)
        continue-on-error: true
        run: ruff check src/ apps/ --exclude archive --exclude node_modules

  next-build:
    name: public-site build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/public-site

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder
      PROPERTY_API_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/public-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build
